name: Intraday Sentiment Pipeline

on:
  schedule:
    - cron: "30 23 * * 0-4"
    - cron: "30 0-6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intraday:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Restore intraday history from gh-pages
        run: |
          mkdir -p public/data/intraday
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git checkout FETCH_HEAD -- data/intraday 2>/dev/null || true
          if [ -d data/intraday ]; then
            cp -r data/intraday/. public/data/intraday/
            echo "Restored $(ls public/data/intraday/*.json 2>/dev/null | wc -l) history files"
          fi

      - name: Generate intraday snapshot
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
          GENERATE_AI_IMAGE: false
        run: python intraday.py

      - name: Prepare intraday publish directory
        run: mkdir -p intraday_publish/data/intraday && cp public/live.html intraday_publish/live.html && cp -r public/data/intraday/. intraday_publish/data/intraday/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./intraday_publish
          branch: gh-pages
          keep_files: true
          allow_empty_commit: true
