name: Build and Deploy Pages

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 23 * * 0-4"
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Restore snapshot history from gh-pages
        run: |
          mkdir -p public/data
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git checkout FETCH_HEAD -- data 2>/dev/null || true
          if [ -d data ]; then
            cp -r data/. public/data/
            echo "Restored $(ls public/data/*.json 2>/dev/null | wc -l) snapshot files"
          fi
          git ls-tree --name-only FETCH_HEAD 2>/dev/null | grep '^cover_.*\.png$' | while read f; do
            git checkout FETCH_HEAD -- "$f" 2>/dev/null && cp "$f" public/ && echo "Restored cover: $f" || true
          done || true

      - name: Generate page
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
          GENERATE_AI_IMAGE: ${{ github.event_name != 'push' }}
        run: python main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          branch: gh-pages
          keep_files: true
          allow_empty_commit: true
