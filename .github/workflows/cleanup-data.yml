name: Cleanup Old JSON Data

on:
  schedule:
    - cron: "0 15 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Remove JSON older than 30 days
        run: python source/cleanup_json.py --data-dir gh-pages/data --retention-days 30

      - name: Configure git author
        run: git -C gh-pages config user.name "github-actions[bot]" && git -C gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit cleanup changes
        run: git -C gh-pages add -A && git -C gh-pages diff --cached --quiet || (git -C gh-pages commit -m "Cleanup JSON data older than 30 days" && git -C gh-pages push)
