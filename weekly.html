<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주간 시장 리포트 | 2026-W11</title>
  <style>
    :root {
      --bg-a: #f8fafc;
      --bg-b: #e2e8f0;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe4ef;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, var(--bg-a), var(--bg-b));
      min-height: 100vh;
    }
    .page { max-width: 920px; margin: 0 auto; padding: 36px 16px 64px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-top: 16px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(1.7rem, 4vw, 2.4rem); }
    .meta { margin: 0; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    .metric { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #f8fafc; }
    .metric p { margin: 0; }
    .label { color: var(--muted); font-size: 0.86rem; }
    .value { font-weight: 750; font-size: 1.12rem; margin-top: 4px; }
    .list { margin: 0; padding-left: 18px; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="page">

    <section class="card">
      <h2>주간 요약</h2>
      <div class="grid">
        <article class="metric"><p class="label">평균 점수</p><p class="value">0 (데이터 부족)</p></article>
        <article class="metric"><p class="label">최고/최저</p><p class="value">0 / 0</p></article>
        <article class="metric"><p class="label">집계 샘플 수</p><p class="value">0</p></article>
        <article class="metric"><p class="label">주요 리스크 이벤트</p><p class="value">데이터 부족</p></article>
      </div>
      <p style="margin-top:12px;"><strong>핵심 관전 포인트:</strong> 데이터 부족</p>
    </section>

    <section class="card">
      <h2>최근 샘플(최신 10개)</h2>
      <ol class="list">

    </section>
  </main>
</body>
</html>
